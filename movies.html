<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movies — AnimeWeb</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .movies-hero {
      position: relative; width: 100%; height: 320px; overflow: hidden; margin-top: 62px;
    }
    .movies-hero-bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center 25%;
    }
    .movies-hero-shade {
      position: absolute; inset: 0;
      background: linear-gradient(to right, rgba(9,9,15,0.96) 30%, rgba(9,9,15,0.5) 70%, transparent 100%),
                  linear-gradient(to top, rgba(9,9,15,1) 0%, transparent 50%);
    }
    .movies-hero-content {
      position: absolute; bottom: 2rem; left: 2.5rem; max-width: 460px;
    }
    .movies-hero-label {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 1.5px;
      color: var(--purple-lt); text-transform: uppercase; margin-bottom: 0.5rem;
    }
    .movies-hero-title {
      font-size: clamp(1.5rem, 3.5vw, 2.2rem); font-weight: 800;
      line-height: 1.15; letter-spacing: -0.5px; margin-bottom: 0.6rem;
    }
    .movies-hero-meta {
      font-size: 0.82rem; color: var(--muted); display: flex; gap: 1rem; flex-wrap: wrap;
    }
    .movies-hero-score { color: var(--gold); font-weight: 700; }

    .filter-bar { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.75rem; }
    .filter-btn {
      padding: 0.4rem 1.1rem; border-radius: 100px; font-size: 0.8rem; font-weight: 600;
      border: 1px solid var(--border); background: var(--card); color: var(--muted);
      cursor: pointer; transition: all var(--t);
    }
    .filter-btn:hover  { border-color: var(--purple); color: var(--text); }
    .filter-btn.active { background: var(--purple-dk); border-color: var(--purple); color: #fff; }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-logo"><img src="logo.svg" style="height:26px;width:26px;border-radius:6px;flex-shrink:0"> AnimeWeb</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="movies.html" class="active">Movies</a></li>
    <li><a href="watchlist.html">My List</a></li>
    <li><a href="browse.html">Browse Free</a></li>
  </ul>
  <div class="nav-search">
    <span class="search-icon">🔍</span>
    <input type="text" id="navSearch" placeholder="Search anime...">
    <div class="search-drop" id="searchDrop"></div>
  </div>
</nav>

<!-- Hero — populated by JS with a featured movie -->
<div class="movies-hero" id="moviesHero">
  <div class="movies-hero-bg" id="heroMovieBg"></div>
  <div class="movies-hero-shade"></div>
  <div class="movies-hero-content">
    <div class="movies-hero-label">🎬 Featured Film</div>
    <div class="movies-hero-title" id="heroMovieTitle">Loading…</div>
    <div class="movies-hero-meta" id="heroMovieMeta"></div>
    <div style="margin-top:1rem">
      <button class="btn btn-primary" id="heroWatchBtn">▶ Watch Now</button>
    </div>
  </div>
</div>

<div class="page">
  <div class="section" style="padding-top:1.5rem">

    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" data-sort="POPULARITY_DESC">Popular</button>
      <button class="filter-btn" data-sort="SCORE_DESC">Top Rated</button>
      <button class="filter-btn" data-sort="TRENDING_DESC">Trending</button>
      <button class="filter-btn" data-sort="START_DATE_DESC">Recent</button>
    </div>

    <div class="grid" id="movieGrid"></div>

    <div id="moreWrap" style="text-align:center;margin-top:2.5rem;display:none">
      <button class="btn btn-ghost" id="moreBtn">Load More</button>
    </div>

  </div>
</div>

<script src="app.js"></script>
<script>
  const MOVIE_QUERY = `query($sort:[MediaSort],$p:Int){
    Page(page:$p,perPage:24){
      pageInfo{ hasNextPage }
      media(type:ANIME,format:MOVIE,sort:$sort,averageScore_greater:1){
        id title{romaji english} coverImage{extraLarge large} bannerImage
        duration status averageScore genres season seasonYear format description(asHtml:false)
      }
    }
  }`;

  let currentSort = 'POPULARITY_DESC';
  let page = 1, loading = false;

  const grid     = $('#movieGrid');
  const moreWrap = $('#moreWrap');
  const moreBtn  = $('#moreBtn');

  function movieCard(a) {
    const title = a.title.english || a.title.romaji;
    const img   = a.coverImage?.extraLarge || a.coverImage?.large || '';
    const score = a.averageScore ? `<span class="acard-score">★ ${fmt.score(a.averageScore)}</span>` : '';
    const dur   = a.duration ? `<span>${a.duration}m</span>` : '';
    const saved = S.inWatchlist(a.id);
    const c = mk('div', 'acard');
    c.innerHTML = `
      <img src="${img}" alt="" loading="lazy">
      <div class="acard-info">
        <div class="acard-title">${title}</div>
        <div class="acard-meta">${score}${score && dur ? ' · ' : ''}${dur}</div>
      </div>
      <div class="acard-play">▶</div>
      <button class="acard-heart${saved ? ' saved' : ''}" title="${saved ? 'Remove from list' : 'Add to list'}">♥</button>`;
    c.querySelector('img').onerror = function() {
      this.parentElement.style.background = 'var(--card-hover)';
      this.style.display = 'none';
    };
    c.querySelector('.acard-heart').addEventListener('click', e => {
      e.stopPropagation();
      S.toggleWatchlist(a);
      const btn = e.currentTarget;
      const nowSaved = S.inWatchlist(a.id);
      btn.classList.toggle('saved', nowSaved);
      toast(nowSaved ? 'Added to My List' : 'Removed from My List');
    });
    c.addEventListener('click', () => location.href = 'browse.html');
    return c;
  }

  async function fetchMovies(p) {
    const d = await gql(MOVIE_QUERY, { sort: [currentSort], p });
    return { items: d.Page.media, hasMore: d.Page.pageInfo.hasNextPage };
  }

  function setHero(a) {
    const bg = $('#heroMovieBg');
    bg.style.backgroundImage = `url('${a.bannerImage || a.coverImage?.extraLarge || ''}')`;
    $('#heroMovieTitle').textContent = a.title.english || a.title.romaji;
    const score = a.averageScore ? `<span class="movies-hero-score">★ ${fmt.score(a.averageScore)}</span>` : '';
    const yr    = a.seasonYear ? `<span>${a.seasonYear}</span>` : '';
    const dur   = a.duration   ? `<span>${a.duration} min</span>` : '';
    $('#heroMovieMeta').innerHTML = [score, yr, dur].filter(Boolean).join('<span style="color:var(--dim)">·</span>');
    $('#moviesHero').style.cursor = 'default';
    $('#heroWatchBtn').onclick = () => location.href = 'browse.html';
  }

  async function load(sort) {
    currentSort = sort; page = 1;
    moreWrap.style.display = 'none';
    skels(grid, 24);

    const { items, hasMore } = await fetchMovies(1);
    grid.innerHTML = '';

    if (!items.length) {
      grid.innerHTML = `<div class="empty"><div class="empty-icon">🎬</div><div class="empty-title">No movies found</div></div>`;
      return;
    }

    // Featured hero — pick highest scored with a banner
    const featured = items.find(a => a.bannerImage) || items[0];
    setHero(featured);

    items.forEach(a => grid.appendChild(movieCard(a)));
    if (hasMore) moreWrap.style.display = 'block';
  }

  async function loadMore() {
    if (loading) return;
    loading = true; moreBtn.textContent = 'Loading…'; moreBtn.disabled = true;
    page++;
    const { items, hasMore } = await fetchMovies(page);
    items.forEach(a => grid.appendChild(movieCard(a)));
    if (!hasMore) moreWrap.style.display = 'none';
    else { moreBtn.textContent = 'Load More'; moreBtn.disabled = false; }
    loading = false;
  }

  $$('.filter-btn', $('#filterBar')).forEach(btn => {
    btn.addEventListener('click', () => {
      $$('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      load(btn.dataset.sort);
    });
  });

  moreBtn.addEventListener('click', loadMore);

  load('POPULARITY_DESC').catch(err => {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">Failed to load</div><div class="empty-body">${err.message}</div></div>`;
  });
</script>
</body>
</html>
