<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movies — AniStream</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .movies-hero {
      width: 100%; padding: 3rem 0 2rem;
      text-align: center;
      background: linear-gradient(to bottom, rgba(168,85,247,0.08) 0%, transparent 100%);
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
    }
    .movies-hero h1 {
      font-size: 2rem; font-weight: 800; letter-spacing: -0.5px;
      background: var(--grad); -webkit-background-clip: text;
      background-clip: text; -webkit-text-fill-color: transparent;
    }
    .movies-hero p { color: var(--muted); font-size: 0.88rem; margin-top: 0.4rem; }

    .filter-bar { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.75rem; }
    .filter-btn {
      padding: 0.4rem 1.1rem; border-radius: 100px;
      font-size: 0.8rem; font-weight: 600;
      border: 1px solid var(--border); background: var(--card);
      color: var(--muted); cursor: pointer; transition: all var(--t);
    }
    .filter-btn:hover  { border-color: var(--purple); color: var(--text); }
    .filter-btn.active { background: var(--purple-dk); border-color: var(--purple); color: #fff; }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-logo">⟐ AniStream</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="movies.html" class="active">Movies</a></li>
    <li><a href="watchlist.html">My List</a></li>
    <li><a href="browse.html">Browse Free</a></li>
  </ul>
  <div class="nav-search">
    <span class="search-icon">🔍</span>
    <input type="text" id="navSearch" placeholder="Search anime...">
    <div class="search-drop" id="searchDrop"></div>
  </div>
</nav>

<div class="page">
  <div class="movies-hero">
    <h1>Anime Movies</h1>
    <p>Feature films, standalone specials, and cinematic releases</p>
  </div>

  <div class="section">
    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" data-sort="POPULARITY_DESC">Popular</button>
      <button class="filter-btn" data-sort="SCORE_DESC">Top Rated</button>
      <button class="filter-btn" data-sort="TRENDING_DESC">Trending</button>
      <button class="filter-btn" data-sort="START_DATE_DESC">Recent</button>
    </div>

    <div class="grid" id="movieGrid"></div>

    <div id="moreWrap" style="text-align:center;margin-top:2.5rem;display:none">
      <button class="btn btn-ghost" id="moreBtn">Load More</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  const MOVIE_QUERY = `query($sort:[MediaSort],$p:Int){
    Page(page:$p,perPage:24){
      pageInfo{ hasNextPage }
      media(type:ANIME,format:MOVIE,sort:$sort,averageScore_greater:1){
        id title{romaji english} coverImage{extraLarge large}
        duration status averageScore genres season seasonYear format
      }
    }
  }`;

  let currentSort = 'POPULARITY_DESC';
  let page = 1;
  let loading = false;

  const grid     = $('#movieGrid');
  const moreWrap = $('#moreWrap');
  const moreBtn  = $('#moreBtn');

  async function fetchMovies(p) {
    const d = await gql(MOVIE_QUERY, { sort: [currentSort], p });
    return { items: d.Page.media, hasMore: d.Page.pageInfo.hasNextPage };
  }

  async function load(sort) {
    currentSort = sort;
    page = 1;
    moreWrap.style.display = 'none';
    skels(grid, 24);
    const { items, hasMore } = await fetchMovies(1);
    grid.innerHTML = '';
    if (!items.length) {
      grid.innerHTML = `<div class="empty"><div class="empty-icon">🎬</div>
        <div class="empty-title">No movies found</div></div>`;
      return;
    }
    items.forEach(a => grid.appendChild(card(a)));
    if (hasMore) moreWrap.style.display = 'block';
  }

  async function loadMore() {
    if (loading) return;
    loading = true;
    moreBtn.textContent = 'Loading…';
    moreBtn.disabled = true;
    page++;
    const { items, hasMore } = await fetchMovies(page);
    items.forEach(a => grid.appendChild(card(a)));
    if (!hasMore) moreWrap.style.display = 'none';
    else { moreBtn.textContent = 'Load More'; moreBtn.disabled = false; }
    loading = false;
  }

  $$('.filter-btn', $('#filterBar')).forEach(btn => {
    btn.addEventListener('click', () => {
      $$('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      load(btn.dataset.sort);
    });
  });

  moreBtn.addEventListener('click', loadMore);

  load('POPULARITY_DESC').catch(err => {
    grid.innerHTML = `<div class="empty">
      <div class="empty-icon">⚠️</div>
      <div class="empty-title">Failed to load</div>
      <div class="empty-body">${err.message}</div>
    </div>`;
  });
</script>
</body>
</html>
