<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AnimeWeb — Full Library</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Next Up strip ───────────────────────────────────────── */
    .nextup-section { max-width:1400px; margin-inline:auto; padding:2rem 2rem 0; }
    .nextup-row { display:flex; gap:.85rem; overflow-x:auto; scrollbar-width:none; padding-bottom:.75rem; }
    .nextup-row::-webkit-scrollbar { display:none; }
    .nextup-card {
      flex:0 0 200px; background:var(--card); border:1px solid var(--border);
      border-radius:10px; overflow:hidden; cursor:pointer; transition:all var(--t);
      display:flex; align-items:center; gap:.7rem; padding:.55rem .7rem;
    }
    .nextup-card:hover { border-color:var(--purple); transform:translateY(-2px); }
    .nextup-thumb { width:46px; height:64px; object-fit:cover; border-radius:6px; flex-shrink:0; background:var(--card-hover); }
    .nextup-info { flex:1; min-width:0; }
    .nextup-title { font-size:.75rem; font-weight:700; line-height:1.3; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
    .nextup-ep { font-size:.68rem; color:var(--purple-lt); margin-top:.25rem; font-weight:600; }
    .nextup-prog { height:2px; background:var(--border); border-radius:2px; margin-top:.4rem; overflow:hidden; }
    .nextup-prog-fill { height:100%; background:var(--purple); border-radius:2px; }

    /* ── Notification bell ───────────────────────────────────── */
    .notif-bell {
      background:none; border:1px solid var(--border); color:var(--muted);
      border-radius:8px; padding:.3rem .6rem; cursor:pointer; font-size:.9rem;
      transition:all var(--t); flex-shrink:0;
    }
    .notif-bell:hover, .notif-bell.on { border-color:var(--purple); color:var(--purple-lt); }
    .notif-bell.on { background:rgba(168,85,247,.1); }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ── Now Airing strip ─────────────────────────────────────────────────── */
    .airing-section {
      margin-top: 62px;
      padding: 2rem 2rem 0;
      max-width: 1400px;
      margin-inline: auto;
    }
    .strip-head {
      display: flex; align-items: center; gap: 0.6rem;
      margin-bottom: 1rem;
    }
    .live-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #ef4444;
      box-shadow: 0 0 6px #ef4444;
      animation: pulse 1.8s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.8); }
    }
    .strip-title {
      font-size: 1rem; font-weight: 700; letter-spacing: -0.2px;
    }
    .strip-sub {
      font-size: 0.75rem; color: var(--dim); margin-left: auto;
    }
    .airing-row {
      display: flex; gap: 0.85rem; overflow-x: auto; padding-bottom: 0.75rem;
      scrollbar-width: none;
    }
    .airing-row::-webkit-scrollbar { display: none; }
    .airing-row .acard { flex: 0 0 140px; width: 140px; }
    .airing-skel { flex: 0 0 140px; width: 140px; aspect-ratio: 3/4; }

    /* ── Divider ──────────────────────────────────────────────────────────── */
    .section-divider {
      height: 1px; background: var(--border);
      max-width: 1400px; margin: 2rem auto 0;
    }

    /* ── Database header ──────────────────────────────────────────────────── */
    .db-header {
      padding: 2rem 2rem 0;
      max-width: 1400px;
      margin-inline: auto;
    }
    .db-top-row {
      display: flex; align-items: flex-end; justify-content: space-between;
      flex-wrap: wrap; gap: 1rem; margin-bottom: 1.2rem;
    }
    .db-title {
      font-size: clamp(1.4rem, 3vw, 2rem); font-weight: 800;
      letter-spacing: -0.4px; line-height: 1.2;
    }
    .db-sub { color: var(--muted); font-size: 0.82rem; margin-top: 0.25rem; }
    .db-sub strong { color: var(--purple-lt); }

    /* Stats */
    .db-stats { display: flex; gap: 1.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .db-stat-val { font-size: 1.2rem; font-weight: 800; color: var(--purple-lt); }
    .db-stat-lbl { font-size: 0.68rem; color: var(--dim); text-transform: uppercase; letter-spacing: 0.05em; }

    /* Sort controls */
    .db-controls {
      display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap;
      margin-bottom: 1.2rem;
    }
    .db-sort-label { font-size: 0.75rem; color: var(--dim); flex-shrink: 0; }
    .db-sort-btn {
      padding: 0.32rem 0.85rem; border-radius: 100px; font-size: 0.75rem; font-weight: 600;
      border: 1px solid var(--border); background: var(--card); color: var(--muted);
      cursor: pointer; transition: all var(--t);
    }
    .db-sort-btn:hover { border-color: var(--purple); color: var(--text); }
    .db-sort-btn.active {
      background: rgba(168,85,247,0.14); border-color: var(--purple); color: var(--purple-lt);
    }

    /* Genre pills */
    .genre-filter {
      display: flex; gap: 0.45rem; overflow-x: auto; scrollbar-width: none;
      padding-bottom: 0.25rem; margin-bottom: 1.5rem;
    }
    .genre-filter::-webkit-scrollbar { display: none; }
    .gf-chip {
      flex-shrink: 0; padding: 0.3rem 0.85rem; border-radius: 100px;
      font-size: 0.73rem; font-weight: 600; cursor: pointer;
      border: 1px solid var(--border); background: var(--card); color: var(--muted);
      transition: all var(--t);
    }
    .gf-chip:hover { border-color: var(--purple); color: var(--text); }
    .gf-chip.active {
      background: rgba(168,85,247,0.14); border-color: var(--purple); color: var(--purple-lt);
    }

    /* Progress bar */
    .progress-bar-wrap {
      height: 2px; background: var(--card); border-radius: 2px;
      margin-bottom: 1.5rem; overflow: hidden;
    }
    .progress-bar {
      height: 100%; background: linear-gradient(90deg, var(--purple), var(--purple-lt));
      border-radius: 2px; transition: width 0.5s ease;
    }

    /* Grid */
    .db-wrap { padding: 0 2rem 6rem; max-width: 1400px; margin: 0 auto; }
    .db-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
      gap: 1rem;
    }

    /* Sentinel + fetch indicator */
    #sentinel { height: 1px; }
    .fetch-indicator {
      text-align: center; padding: 2rem; color: var(--dim); font-size: 0.82rem;
      display: none;
    }
    .fetch-indicator.active { display: block; }
    .fetch-dots { display: inline-flex; gap: 4px; margin-left: 0.5rem; }
    .fetch-dot {
      width: 5px; height: 5px; border-radius: 50%; background: var(--purple);
      animation: bounce 1.2s ease-in-out infinite;
    }
    .fetch-dot:nth-child(2) { animation-delay: 0.2s; }
    .fetch-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40%            { transform: scale(1);   opacity: 1; }
    }

    /* End of list */
    .db-end {
      text-align: center; padding: 2rem; color: var(--dim); font-size: 0.82rem;
      display: none;
    }
    .db-end.show { display: block; }

    /* ── Live Scraping section ────────────────────────────────────────────── */
    .scraping-section {
      max-width: 1400px; margin-inline: auto;
      padding: 1.75rem 2rem 0;
    }
    .scraping-head {
      display: flex; align-items: center; gap: 0.65rem;
      margin-bottom: 0.9rem; flex-wrap: wrap;
    }
    .scrape-stats {
      font-size: 0.75rem; color: var(--dim); margin-left: 0.2rem;
    }
    .refresh-wrap {
      margin-left: auto; display: flex; align-items: center; gap: 0.5rem;
    }
    .refresh-btn {
      font-size: 0.7rem; color: var(--dim); background: none; border: 1px solid var(--border);
      border-radius: 6px; padding: 0.2rem 0.55rem; cursor: pointer; transition: all var(--t);
    }
    .refresh-btn:hover { border-color: var(--purple); color: var(--purple-lt); }
    .refresh-clock {
      font-size: 0.7rem; color: var(--dim); font-variant-numeric: tabular-nums;
    }

    /* Site launcher strip */
    .site-launcher {
      display: flex; gap: 0.5rem; overflow-x: auto; scrollbar-width: none;
      padding-bottom: 0.75rem; margin-bottom: 1rem;
    }
    .site-launcher::-webkit-scrollbar { display: none; }
    .site-chip {
      flex-shrink: 0; display: flex; align-items: center; gap: 0.45rem;
      padding: 0.32rem 0.75rem 0.32rem 0.45rem; border-radius: 100px;
      border: 1px solid var(--border); background: var(--card);
      cursor: pointer; transition: all var(--t); text-decoration: none;
    }
    .site-chip:hover { border-color: var(--purple); background: rgba(168,85,247,.08); }
    .site-chip img { width: 16px; height: 16px; border-radius: 3px; }
    .site-chip span { font-size: 0.73rem; font-weight: 600; color: var(--muted); }
    .site-chip:hover span { color: var(--purple-lt); }
    .site-online {
      width: 5px; height: 5px; border-radius: 50%; background: #4ade80;
      box-shadow: 0 0 4px #4ade80; flex-shrink: 0;
    }

    /* Scrape grid */
    .scrape-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
      gap: 1rem;
      margin-bottom: 0.5rem;
    }

    /* Scrape card — extends .acard with watch overlay */
    .scrape-card { position: relative; }
    .watch-overlay {
      position: absolute; inset: 0; border-radius: 10px;
      background: rgba(0,0,0,0); display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 0.4rem;
      opacity: 0; transition: all 0.2s; cursor: pointer;
    }
    .scrape-card:hover .watch-overlay {
      background: rgba(0,0,0,0.72); opacity: 1;
    }
    .watch-btn {
      padding: 0.45rem 1rem; border-radius: 100px; font-size: 0.75rem; font-weight: 700;
      background: var(--purple); color: #fff; border: none; cursor: pointer;
      transition: background var(--t); white-space: nowrap;
    }
    .watch-btn:hover { background: var(--purple-lt); }
    .sites-available {
      display: flex; gap: 3px; flex-wrap: wrap; justify-content: center;
      padding: 0 0.5rem;
    }
    .avail-dot {
      width: 18px; height: 18px; border-radius: 3px; overflow: hidden;
      background: rgba(255,255,255,.1);
    }
    .avail-dot img { width: 100%; height: 100%; object-fit: cover; }
  </style>
</head>

<script src="app.js"></script>
<script>
initSearch();

// ── State ─────────────────────────────────────────────────────────────────────
let ALL_IDS  = [];
let LOADED   = [];
let CHUNK    = 0;
let TOTAL    = 0;
let loading  = false;
let hasMore  = true;
let curSort  = 'score';
let curGenre = null;
const CHUNK_SZ = 50;

const grid      = document.getElementById('dbGrid');
const sub       = document.getElementById('dbSub');
const statsEl   = document.getElementById('dbStats');
const pbar      = document.getElementById('progressBar');
const genreFilter   = document.getElementById('genreFilter');
const fetchInd  = document.getElementById('fetchIndicator');
const dbEnd     = document.getElementById('dbEnd');
const airingRow = document.getElementById('airingRow');

// ── Now Airing strip ──────────────────────────────────────────────────────────
async function loadAiring() {
  skels(airingRow, 8);
  airingRow.querySelectorAll('.acard').forEach(c => {
    c.style.flex = '0 0 140px';
    c.style.width = '140px';
  });
  try {
    const data = await gql(Q.trending);
    const media = data?.Page?.media || [];
    airingRow.innerHTML = '';
    media.forEach(a => {
      const c = card(a);
      c.style.flex = '0 0 140px';
      c.style.width = '140px';
      airingRow.appendChild(c);
    });
  } catch {
    airingRow.innerHTML = '<span style="color:var(--dim);font-size:.8rem;padding:.5rem">Could not load</span>';
  }
}

// ── Load ID catalog ───────────────────────────────────────────────────────────
async function init() {
  loadAiring(); // fire in parallel — don't await

  try {
    const r    = await fetch('data/anime-ids.json');
    const data = await r.json();
    ALL_IDS = data.ids || [];
    TOTAL   = ALL_IDS.length;
    const updated = data.updated ? new Date(data.updated).toLocaleDateString() : '';

    sub.innerHTML = `<strong>${TOTAL}</strong> titles · updated ${updated} · auto-grows weekly`;
    statsEl.innerHTML = `
      <div><div class="db-stat-val">${TOTAL}</div><div class="db-stat-lbl">Titles</div></div>
      <div><div class="db-stat-val">${Math.ceil(TOTAL / CHUNK_SZ)}</div><div class="db-stat-lbl">Batches</div></div>
      <div><div class="db-stat-val">${updated}</div><div class="db-stat-lbl">Updated</div></div>
    `;

    // Seed grid with skeletons
    skels(grid, 20);
    await loadChunk();
    observeSentinel();
  } catch {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:4rem 1rem;color:var(--muted)">
      <div style="font-size:2rem;margin-bottom:.75rem">⚠</div>
      <p>Could not load catalog — retrying…</p>
    </div>`;
  }
}

// ── Load one chunk from AniList ───────────────────────────────────────────────
async function loadChunk() {
  if (loading || !hasMore) return;
  const start = CHUNK * CHUNK_SZ;
  if (start >= TOTAL) { finish(); return; }

  loading = true;
  fetchInd.classList.add('active');

  const ids = ALL_IDS.slice(start, Math.min(start + CHUNK_SZ, TOTAL));
  pbar.style.width = `${Math.min(((start + ids.length) / TOTAL) * 100, 100)}%`;

  try {
    const data  = await gql(Q.byMalIds, { ids, page: 1 });
    const media = data?.Page?.media || [];
    LOADED.push(...media);
    CHUNK++;
    buildGenreFilter();
    render();
  } catch (e) {
    console.error(e);
  }

  fetchInd.classList.remove('active');
  loading = false;
  hasMore = CHUNK * CHUNK_SZ < TOTAL;
  if (!hasMore) finish();
}

function finish() {
  hasMore = false;
  pbar.style.width = '100%';
  dbEnd.classList.add('show');
  document.getElementById('dbEndCount').textContent = LOADED.length;
}

// ── IntersectionObserver — infinite scroll ────────────────────────────────────
function observeSentinel() {
  const sentinel = document.getElementById('sentinel');
  const obs = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) loadChunk();
  }, { rootMargin: '400px' });
  obs.observe(sentinel);
}

// ── Genre filter ──────────────────────────────────────────────────────────────
function buildGenreFilter() {
  const counts = {};
  LOADED.forEach(a => (a.genres || []).forEach(g => { counts[g] = (counts[g] || 0) + 1; }));
  const top = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 18).map(([g]) => g);

  genreFilter.innerHTML =
    `<button class="gf-chip${!curGenre ? ' active' : ''}" data-genre="">All</button>` +
    top.map(g => `<button class="gf-chip${curGenre === g ? ' active' : ''}" data-genre="${g}">${g}</button>`).join('');

  genreFilter.querySelectorAll('.gf-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      curGenre = btn.dataset.genre || null;
      genreFilter.querySelectorAll('.gf-chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  let items = [...LOADED];
  if (curGenre) items = items.filter(a => (a.genres || []).includes(curGenre));

  items.sort((a, b) => {
    if (curSort === 'score')      return (b.averageScore || 0) - (a.averageScore || 0);
    if (curSort === 'popularity') return (a.popularity || 9999) - (b.popularity || 9999);
    if (curSort === 'newest')     return (b.seasonYear || 0) - (a.seasonYear || 0);
    if (curSort === 'title') {
      const ta = a.title?.english || a.title?.romaji || '';
      const tb = b.title?.english || b.title?.romaji || '';
      return ta.localeCompare(tb);
    }
    return 0;
  });

  grid.innerHTML = '';
  items.forEach(a => grid.appendChild(card(a)));
}

// ── Sort buttons ──────────────────────────────────────────────────────────────
document.querySelectorAll('.db-sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    curSort = btn.dataset.sort;
    document.querySelectorAll('.db-sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

// ── Live Scraping ─────────────────────────────────────────────────────────────

const TOP_SITES = [
  { name: 'HiAnime',    host: 'hianime.to' },
  { name: 'Miruro',     host: 'miruro.tv' },
  { name: 'AnimePahe',  host: 'animepahe.ru' },
  { name: 'Animetsu',   host: 'animetsu.cc' },
  { name: 'Marin',      host: 'marin.moe' },
  { name: 'Twist',      host: 'twist.moe' },
  { name: 'aniwave',    host: 'aniwave.to' },
  { name: 'AnimeLok',   host: 'animelok.online' },
  { name: 'KickAss',    host: 'kickassanime.mx' },
  { name: 'AnimeSuge',  host: 'animesuge.to' },
  { name: 'Tenshi',     host: 'tenshi.moe' },
  { name: 'GogoAnime',  host: 'gogoanime.by' },
];

// AniList query — trending + airing + popular this season combined
const Q_SCRAPE = `query($season:MediaSeason,$year:Int){
  trending: Page(perPage:25){
    media(type:ANIME,sort:TRENDING_DESC,status:RELEASING){ ${MF} }
  }
  seasonal: Page(perPage:20){
    media(type:ANIME,season:$season,seasonYear:$year,sort:POPULARITY_DESC,status:RELEASING){ ${MF} }
  }
  popular: Page(perPage:15){
    media(type:ANIME,sort:POPULARITY_DESC,status:RELEASING){ ${MF} }
  }
}`;

let refreshInterval = null;
let refreshSeconds  = 300; // 5 min
let refreshCountdown;

function buildSiteLauncher() {
  const el = document.getElementById('siteLauncher');
  el.innerHTML = TOP_SITES.map(s => `
    <a class="site-chip" href="browse.html" target="_blank" title="Open ${s.name}">
      <img src="https://www.google.com/s2/favicons?sz=32&domain=${s.host}" alt=""
           onerror="this.style.display='none'">
      <div class="site-online"></div>
      <span>${s.name}</span>
    </a>`).join('');
}

async function loadScrape() {
  const { season, year } = { season: currentSeason(), year: new Date().getFullYear() };
  const grid  = document.getElementById('scrapeGrid');
  const stats = document.getElementById('scrapeStats');

  skels(grid, 12);
  stats.textContent = 'scanning sites…';

  try {
    const data = await gql(Q_SCRAPE, { season, year });
    const seen = new Set();
    const items = [
      ...(data.trending?.media || []),
      ...(data.seasonal?.media  || []),
      ...(data.popular?.media   || []),
    ].filter(a => { if (seen.has(a.id)) return false; seen.add(a.id); return true; });

    grid.innerHTML = '';
    items.forEach(a => {
      const wrap  = document.createElement('div');
      wrap.className = 'scrape-card';

      const c = card(a);
      wrap.appendChild(c);

      // Watch overlay
      const title   = a.title?.english || a.title?.romaji || '';
      const overlay = document.createElement('div');
      overlay.className = 'watch-overlay';

      // Show 4 random site favicons as "available on"
      const siteDots = TOP_SITES.slice(0, 6).map(s =>
        `<div class="avail-dot">
          <img src="https://www.google.com/s2/favicons?sz=32&domain=${s.host}" alt="${s.name}">
        </div>`
      ).join('');

      overlay.innerHTML = `
        <div class="sites-available">${siteDots}</div>
        <button class="watch-btn">▶ Watch Free</button>`;

      overlay.querySelector('.watch-btn').addEventListener('click', e => {
        e.stopPropagation();
        window.open(`browse.html?q=${encodeURIComponent(title)}`, '_blank');
      });

      wrap.appendChild(overlay);
      grid.appendChild(wrap);
    });

    stats.textContent = `${items.length} titles available across ${TOP_SITES.length} sites`;
  } catch {
    stats.textContent = 'refresh failed — retrying…';
  }
}

function refreshScrape() {
  refreshSeconds = 300;
  loadScrape();
}

function startRefreshTimer() {
  const clockEl = document.getElementById('refreshClock');
  refreshCountdown = setInterval(() => {
    refreshSeconds--;
    const m = Math.floor(refreshSeconds / 60);
    const s = String(refreshSeconds % 60).padStart(2, '0');
    clockEl.textContent = `refresh in ${m}:${s}`;
    if (refreshSeconds <= 0) {
      refreshSeconds = 300;
      loadScrape();
    }
  }, 1000);
}

// ── Service Worker + Notifications ───────────────────────────────────────────
registerSW().then(() => {
  checkTrackedEpisodes();
  setInterval(checkTrackedEpisodes, 30 * 60 * 1000); // every 30 min
});

// Bell toggle
const bell = document.getElementById('notifBell');
function updateBell() {
  const on = Notification.permission === 'granted' && S.tracking().length > 0;
  bell.classList.toggle('on', on);
  bell.title = on ? `Tracking ${S.tracking().length} anime` : 'Enable episode notifications';
}
bell.addEventListener('click', async () => {
  const granted = await requestNotifPermission();
  if (!granted) { toast('Enable notifications in your browser settings'); return; }
  toast('Notifications on — track anime from their detail page 🔔');
  updateBell();
});
updateBell();

// ── Next Up strip ─────────────────────────────────────────────────────────────
function buildNextUp() {
  const history = S.history();   // [{id, ep, title, img}]
  const tracked = S.tracking();  // [{id, title}]

  // Merge: history entries that have more to watch, plus tracked
  const seen = new Set();
  const items = [];

  history.forEach(h => {
    if (seen.has(h.id)) return;
    seen.add(h.id);
    items.push(h);
  });
  tracked.forEach(t => {
    if (seen.has(t.id)) return;
    seen.add(t.id);
    items.push({ id: t.id, title: t.title, img: '', ep: 0 });
  });

  if (!items.length) return;

  const section = document.getElementById('nextupSection');
  const row     = document.getElementById('nextupRow');
  section.style.display = '';
  row.innerHTML = '';

  items.slice(0, 12).forEach(h => {
    const prog     = S.progress(h.id);
    const nextEp   = (prog.last || 0) + 1;
    const watched  = prog.eps?.length || 0;

    const card = document.createElement('div');
    card.className = 'nextup-card';
    card.innerHTML = `
      <img class="nextup-thumb" src="${h.img || ''}" alt="" onerror="this.style.opacity=.3">
      <div class="nextup-info">
        <div class="nextup-title">${h.title}</div>
        <div class="nextup-ep">Ep ${nextEp}</div>
        ${watched > 0 ? `<div class="nextup-prog"><div class="nextup-prog-fill" style="width:${Math.min(watched*10,100)}%"></div></div>` : ''}
      </div>`;
    card.addEventListener('click', () => P.go('watch.html', { id: h.id, ep: nextEp }));
    row.appendChild(card);
  });
}

buildNextUp();
buildSiteLauncher();
loadScrape();
startRefreshTimer();

init();
</script>
