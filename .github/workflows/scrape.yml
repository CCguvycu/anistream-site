name: Weekly Anime ID Scrape

on:
  schedule:
    - cron: '0 4 * * 1'   # Every Monday 04:00 UTC
  workflow_dispatch:        # Manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        run: python scripts/scrape_ids.py

      - name: Commit new IDs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: weekly anime ID update [skip ci]'
          file_pattern: data/anime-ids.json
          commit_user_name: 'anime-bot'
          commit_user_email: 'anime-bot@users.noreply.github.com'
