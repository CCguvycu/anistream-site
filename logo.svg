<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#09090f"/>
  <!-- Outer ring -->
  <rect width="64" height="64" rx="14" fill="none" stroke="url(#g)" stroke-width="2.5"/>
  <!-- Play triangle -->
  <polygon points="22,16 22,48 50,32" fill="url(#g)" opacity="0.15"/>
  <!-- A -->
  <text x="10" y="46" font-family="Inter,Arial,sans-serif" font-weight="800" font-size="28" fill="url(#g)">A</text>
  <!-- W -->
  <text x="31" y="46" font-family="Inter,Arial,sans-serif" font-weight="800" font-size="28" fill="white" opacity="0.9">W</text>
</svg>
