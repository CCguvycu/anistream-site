<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AniStream — Watch Anime Free</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; overflow: hidden; }
    .top-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 900;
      height: 54px;
      background: rgba(9,9,15,0.96);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 1.5rem; gap: 1.25rem;
    }
    .top-logo {
      font-size: 1.25rem; font-weight: 800; letter-spacing: -0.5px;
      background: var(--grad); -webkit-background-clip: text;
      background-clip: text; -webkit-text-fill-color: transparent;
      text-decoration: none; white-space: nowrap;
    }
    .top-nav { display: flex; gap: 1rem; align-items: center; }
    .top-nav a {
      font-size: 0.85rem; font-weight: 500; color: var(--muted);
      text-decoration: none; transition: color var(--t);
    }
    .top-nav a:hover { color: var(--text); }
    .src-pills { display: flex; gap: 0.35rem; }
    .src-pill {
      padding: 0.25rem 0.7rem; border-radius: 100px;
      font-size: 0.72rem; font-weight: 600;
      border: 1px solid var(--border); background: var(--card);
      color: var(--muted); cursor: pointer; transition: all var(--t);
    }
    .src-pill:hover  { border-color: var(--purple); color: var(--text); }
    .src-pill.active { background: var(--purple-dk); border-color: var(--purple); color: #fff; }
    .sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
    .top-search { flex: 1; max-width: 340px; margin-left: auto; position: relative; }
    .top-search input {
      width: 100%; background: var(--card); border: 1px solid var(--border);
      border-radius: 100px; padding: 0.42rem 1rem 0.42rem 2.2rem;
      color: var(--text); font-size: 0.82rem; outline: none; transition: border-color var(--t);
    }
    .top-search input:focus { border-color: var(--purple); }
    .top-search input::placeholder { color: var(--dim); }
    .top-search .si { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); color: var(--dim); font-size: 0.78rem; }
    .search-drop { position: absolute; top: calc(100% + 8px); left: 0; right: 0;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); overflow: hidden; display: none; z-index: 200; box-shadow: var(--shadow); }
    .search-drop.open { display: block; }
    .sdrop-item { display: flex; align-items: center; gap: 0.7rem;
      padding: 0.65rem 1rem; cursor: pointer; transition: background var(--t); }
    .sdrop-item:hover { background: var(--card-hover); }
    .sdrop-item img { width: 38px; height: 54px; object-fit: cover; border-radius: var(--r-sm); flex-shrink: 0; }
    .sdrop-title { font-size: 0.82rem; font-weight: 600; }
    .sdrop-meta  { font-size: 0.72rem; color: var(--dim); margin-top: 2px; }
    .site-frame {
      position: fixed; top: 54px; left: 0; right: 0; bottom: 0;
      width: 100%; height: calc(100% - 54px); border: none;
    }
  </style>
</head>
<body>

<div class="top-bar">
  <a href="index.html" class="top-logo">⟐ AniStream</a>
  <div class="sep"></div>
  <div class="src-pills" id="pills"></div>
  <div class="sep"></div>
  <nav class="top-nav">
    <a href="watchlist.html">My List</a>
  </nav>
  <div class="top-search">
    <span class="si">🔍</span>
    <input type="text" id="navSearch" placeholder="Search anime…">
    <div class="search-drop" id="searchDrop"></div>
  </div>
</div>

<iframe class="site-frame" id="frame" allowfullscreen
  allow="autoplay; fullscreen; picture-in-picture; encrypted-media"></iframe>

<script src="app.js"></script>
<script>
  const SITES = [
    { name: 'Animetsu', home: 'https://animetsu.cc/home' },
    { name: 'AnimeLok', home: 'https://animelok.online/home' },
  ];

  let cur = 0;
  const frame  = $('#frame');
  const pills  = $('#pills');

  function load(i) {
    cur = i;
    frame.src = SITES[i].home;
    $$('.src-pill').forEach((p, j) => p.classList.toggle('active', j === i));
    document.title = `AniStream — ${SITES[i].name}`;
  }

  SITES.forEach((s, i) => {
    const p = mk('button', `src-pill${i === 0 ? ' active' : ''}`, s.name);
    p.addEventListener('click', () => load(i));
    pills.appendChild(p);
  });

  load(0);
</script>
</body>
</html>
