<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AniStream — Watch Anime Free</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="index.html" class="nav-logo">⟐ AniStream</a>
  <ul class="nav-links">
    <li><a href="index.html" class="active">Home</a></li>
    <li><a href="watchlist.html">My List</a></li>
    <li><a href="search.html?genre=Action">Action</a></li>
    <li><a href="search.html?genre=Romance">Romance</a></li>
    <li><a href="search.html?genre=Fantasy">Fantasy</a></li>
    <li><a href="search.html?genre=Sci-Fi">Sci-Fi</a></li>
    <li><a href="search.html?sort=SCORE_DESC">Top Rated</a></li>
  </ul>
  <div class="nav-search">
    <span class="search-icon">🔍</span>
    <input type="text" id="navSearch" placeholder="Search anime...">
    <div class="search-drop" id="searchDrop"></div>
  </div>
</nav>

<div class="page">

  <!-- HERO -->
  <div class="hero" id="hero">
    <div class="hero-bg" id="heroBg"></div>
    <div class="hero-shade"></div>
    <div class="hero-body" id="heroBody">
      <div class="skel" style="width:82px;height:22px;border-radius:100px;margin-bottom:0.9rem"></div>
      <div class="skel" style="width:65%;height:48px;margin-bottom:0.9rem"></div>
      <div class="skel" style="width:90%;height:56px;margin-bottom:1.4rem"></div>
      <div style="display:flex;gap:0.65rem">
        <div class="skel" style="width:130px;height:42px;border-radius:12px"></div>
        <div class="skel" style="width:110px;height:42px;border-radius:12px"></div>
      </div>
    </div>
  </div>

  <!-- CONTINUE WATCHING -->
  <section class="section" id="continueSection" style="display:none">
    <div class="section-head">
      <h2 class="section-title">Continue Watching</h2>
    </div>
    <div class="scroll" id="continueScroll"></div>
  </section>

  <!-- TRENDING -->
  <section class="section">
    <div class="section-head">
      <h2 class="section-title">Trending Now</h2>
      <a href="search.html?sort=TRENDING_DESC" class="see-all">See all →</a>
    </div>
    <div class="scroll" id="trendScroll"></div>
  </section>

  <!-- POPULAR -->
  <section class="section">
    <div class="section-head">
      <h2 class="section-title">All Time Popular</h2>
      <a href="search.html?sort=POPULARITY_DESC" class="see-all">See all →</a>
    </div>
    <div class="scroll" id="popScroll"></div>
  </section>

  <!-- TOP RATED -->
  <section class="section">
    <div class="section-head">
      <h2 class="section-title">Top Rated</h2>
      <a href="search.html?sort=SCORE_DESC" class="see-all">See all →</a>
    </div>
    <div class="grid" id="topGrid"></div>
  </section>

</div>

<script src="app.js"></script>
<script>
  const trendEl  = $('#trendScroll');
  const popEl    = $('#popScroll');
  const topEl    = $('#topGrid');

  // Initial skeletons
  skels(trendEl, 10);
  skels(popEl,   10);
  skels(topEl,   20);

  // Continue watching (from localStorage)
  function loadContinue() {
    const h = S.history();
    if (!h.length) return;
    $('#continueSection').style.display = 'block';
    const wrap = $('#continueScroll');
    wrap.innerHTML = '';
    h.slice(0, 12).forEach(item => {
      const c = mk('div', 'acard');
      c.style.cssText = 'flex:0 0 155px;height:220px';
      c.innerHTML = `
        <img src="${item.img||''}" alt="" loading="lazy" onerror="this.style.display='none'">
        <div class="acard-info">
          <div class="acard-title">${item.title}</div>
          <div class="acard-meta" style="color:var(--purple-lt)">Ep ${item.ep}</div>
        </div>
        <div class="acard-play">▶</div>`;
      c.addEventListener('click', () => P.go('watch.html', { id: item.id, ep: item.ep }));
      wrap.appendChild(c);
    });
  }

  // Hero renderer
  function renderHero(anime) {
    const bg = anime.bannerImage || anime.coverImage?.extraLarge;
    if (bg) $('#heroBg').style.backgroundImage = `url('${bg}')`;

    const title  = anime.title.english || anime.title.romaji;
    const score  = anime.averageScore ? `<span class="hero-score">★ ${fmt.score(anime.averageScore)}</span>` : '';
    const genres = (anime.genres || []).slice(0, 4).map(g => `<span class="gtag">${g}</span>`).join('');
    const desc   = fmt.plain(anime.description || '').slice(0, 220);
    const eps    = anime.episodes ? `${anime.episodes} Episodes` : 'Ongoing';

    $('#heroBody').innerHTML = `
      <div class="hero-badge">🔥 Trending</div>
      <h1 class="hero-title">${title}</h1>
      <div class="hero-meta">
        ${score}
        <span>${fmt.status(anime.status)}</span>
        <span>${eps}</span>
      </div>
      <div class="hero-genres">${genres}</div>
      <p class="hero-desc">${desc}...</p>
      <div class="hero-btns">
        <button class="btn btn-primary" data-id="${anime.id}" data-action="watch">▶ Watch Now</button>
        <button class="btn btn-ghost"   data-id="${anime.id}" data-action="info">ℹ More Info</button>
      </div>`;

    // Button clicks
    $$('[data-action]', $('#heroBody')).forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        if (btn.dataset.action === 'watch') P.go('watch.html', { id: btn.dataset.id, ep: 1 });
        else P.go('anime.html', { id: btn.dataset.id });
      });
    });

    // Click on hero background
    $('#hero').addEventListener('click', () => P.go('anime.html', { id: anime.id }));
  }

  // Load all data
  async function init() {
    loadContinue();

    const [trendData, popData, topData] = await Promise.all([
      gql(Q.trending),
      gql(Q.popular),
      gql(Q.topRated),
    ]);

    const trending = trendData.Page.media;
    const popular  = popData.Page.media;
    const topRated = topData.Page.media;

    // Hero — pick random from top 5 trending
    const heroAnime = trending[Math.floor(Math.random() * Math.min(5, trending.length))];
    if (heroAnime) renderHero(heroAnime);

    // Sections
    trendEl.innerHTML = '';
    trending.forEach(a => { const c = card(a); c.style.cssText='flex:0 0 155px;height:220px'; trendEl.appendChild(c); });

    popEl.innerHTML = '';
    popular.forEach(a => { const c = card(a); c.style.cssText='flex:0 0 155px;height:220px'; popEl.appendChild(c); });

    topEl.innerHTML = '';
    topRated.forEach(a => topEl.appendChild(card(a)));
  }

  init().catch(err => {
    console.error(err);
    $('#heroBody').innerHTML = `<div style="color:var(--muted)">⚠ Failed to load — check your connection</div>`;
  });
</script>
</body>
</html>
