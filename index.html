<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AnimeWeb — Watch Anime Free</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ── Hero Banner ── */
    .hero {
      position: relative; width: 100%;
      height: 520px; overflow: hidden;
      margin-top: 62px;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center 20%;
      transition: opacity 0.6s ease;
    }
    .hero-shade {
      position: absolute; inset: 0;
      background: linear-gradient(to right, rgba(9,9,15,0.95) 30%, rgba(9,9,15,0.4) 70%, transparent 100%),
                  linear-gradient(to top, rgba(9,9,15,1) 0%, transparent 40%);
    }
    .hero-content {
      position: absolute; bottom: 2.5rem; left: 2.5rem;
      max-width: 480px;
    }
    .hero-genres { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
    .hero-genre {
      font-size: 0.7rem; font-weight: 600; padding: 0.2rem 0.65rem;
      border-radius: 100px; background: rgba(168,85,247,0.18);
      border: 1px solid rgba(168,85,247,0.35); color: var(--purple-lt);
    }
    .hero-title {
      font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 800;
      line-height: 1.15; letter-spacing: -0.5px; margin-bottom: 0.65rem;
    }
    .hero-meta { font-size: 0.82rem; color: var(--muted); margin-bottom: 0.9rem; display: flex; gap: 1rem; align-items: center; }
    .hero-score { color: var(--gold); font-weight: 700; }
    .hero-desc {
      font-size: 0.85rem; color: var(--muted); line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
      margin-bottom: 1.25rem;
    }
    .hero-btns { display: flex; gap: 0.75rem; }
    .hero-dots {
      position: absolute; bottom: 1.25rem; right: 2rem;
      display: flex; gap: 0.4rem;
    }
    .hero-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,0.25); cursor: pointer;
      transition: all var(--t);
    }
    .hero-dot.on { background: var(--purple); width: 20px; border-radius: 3px; }

    /* ── Sections ── */
    .home-wrap { padding: 2rem 2rem 4rem; max-width: 1400px; margin: 0 auto; }
    .section-row { margin-bottom: 2.5rem; }
    .section-row-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.1rem;
    }
    .section-row-title { font-size: 1.05rem; font-weight: 700; }
    .section-row-more {
      font-size: 0.78rem; color: var(--muted); font-weight: 500;
      transition: color var(--t);
    }
    .section-row-more:hover { color: var(--purple); }

    /* ── Horizontal scroll row ── */
    .card-row {
      display: flex; gap: 0.85rem;
      overflow-x: auto; padding-bottom: 0.5rem;
      scrollbar-width: none;
    }
    .card-row::-webkit-scrollbar { display: none; }
    .card-row .acard {
      flex: 0 0 148px; width: 148px;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-logo">
    <img src="logo.svg" style="height:26px;width:26px;border-radius:6px;flex-shrink:0"> AnimeWeb
  </a>
  <ul class="nav-links">
    <li><a href="index.html" class="active">Home</a></li>
    <li><a href="movies.html">Movies</a></li>
    <li><a href="watchlist.html">My List</a></li>
    <li><a href="browse.html">Browse Free</a></li>
  </ul>
  <div class="nav-search">
    <span class="search-icon">🔍</span>
    <input type="text" id="navSearch" placeholder="Search anime...">
    <div class="search-drop" id="searchDrop"></div>
  </div>
</nav>

<!-- HERO -->
<div class="hero" id="hero">
  <div class="hero-bg" id="heroBg"></div>
  <div class="hero-shade"></div>
  <div class="hero-content" id="heroContent">
    <div class="hero-genres" id="heroGenres"></div>
    <div class="hero-title" id="heroTitle">Loading…</div>
    <div class="hero-meta" id="heroMeta"></div>
    <div class="hero-desc" id="heroDesc"></div>
    <div class="hero-btns">
      <button class="btn btn-primary" id="heroWatch">▶ Browse Free</button>
      <button class="btn btn-ghost" id="heroInfo">Info</button>
    </div>
  </div>
  <div class="hero-dots" id="heroDots"></div>
</div>

<!-- CONTENT -->
<div class="home-wrap">

  <!-- Trending -->
  <div class="section-row">
    <div class="section-row-head">
      <span class="section-row-title">🔥 Trending Now</span>
      <a href="search.html?sort=TRENDING_DESC" class="section-row-more">See all →</a>
    </div>
    <div class="card-row" id="trendingRow"></div>
  </div>

  <!-- Popular -->
  <div class="section-row">
    <div class="section-row-head">
      <span class="section-row-title">⭐ Most Popular</span>
      <a href="search.html?sort=POPULARITY_DESC" class="section-row-more">See all →</a>
    </div>
    <div class="card-row" id="popularRow"></div>
  </div>

  <!-- Top Rated -->
  <div class="section-row">
    <div class="section-row-head">
      <span class="section-row-title">🏆 Top Rated</span>
      <a href="search.html?sort=SCORE_DESC" class="section-row-more">See all →</a>
    </div>
    <div class="card-row" id="topRatedRow"></div>
  </div>

</div>

<script src="app.js"></script>
<script>
  // ── Hero ──
  let heroAnime = [];
  let heroIdx = 0;
  let heroTimer;

  function setHero(a) {
    const bg    = $('#heroBg');
    const title = $('#heroTitle');
    const meta  = $('#heroMeta');
    const desc  = $('#heroDesc');
    const genres = $('#heroGenres');

    bg.style.backgroundImage = `url('${a.bannerImage || a.coverImage?.extraLarge || ''}')`;
    title.textContent = a.title.english || a.title.romaji;
    desc.textContent  = fmt.plain(a.description || '');

    const score = a.averageScore ? `<span class="hero-score">★ ${fmt.score(a.averageScore)}</span>` : '';
    const eps   = a.episodes ? `${a.episodes} eps` : '';
    const yr    = a.seasonYear || '';
    meta.innerHTML = [score, eps, yr].filter(Boolean).join('<span style="color:var(--dim)">·</span>');

    genres.innerHTML = (a.genres || []).slice(0, 4)
      .map(g => `<span class="hero-genre">${g}</span>`).join('');

    $('#heroWatch').onclick = () => location.href = 'browse.html';
    $('#heroInfo').onclick  = () => P.go('anime.html', { id: a.id });
  }

  function buildDots(n) {
    const el = $('#heroDots');
    el.innerHTML = '';
    for (let i = 0; i < n; i++) {
      const d = mk('div', `hero-dot${i === 0 ? ' on' : ''}`);
      d.addEventListener('click', () => cycleHero(i));
      el.appendChild(d);
    }
  }

  function cycleHero(i) {
    heroIdx = i;
    setHero(heroAnime[i]);
    $$('.hero-dot').forEach((d, j) => d.classList.toggle('on', j === i));
    clearInterval(heroTimer);
    heroTimer = setInterval(() => cycleHero((heroIdx + 1) % heroAnime.length), 6000);
  }

  // ── Display-only card (no click — home page is showcase only) ──
  function showcaseCard(a) {
    const title = a.title.english || a.title.romaji;
    const img   = a.coverImage?.extraLarge || a.coverImage?.large || '';
    const score = a.averageScore ? `<span class="acard-score">★ ${fmt.score(a.averageScore)}</span>` : '';
    const eps   = a.episodes ? `<span>${a.episodes}ep</span>` : '';
    const sep   = score && eps ? ' · ' : '';
    const c = mk('div', 'acard');
    c.style.cursor = 'default';
    c.innerHTML = `
      <img src="${img}" alt="" loading="lazy">
      <div class="acard-info">
        <div class="acard-title">${title}</div>
        <div class="acard-meta">${score}${sep}${eps}</div>
      </div>`;
    c.querySelector('img').onerror = function () {
      this.parentElement.style.background = 'var(--card-hover)';
      this.style.display = 'none';
    };
    return c;
  }

  // ── Rows ──
  function fillRow(el, items) {
    el.innerHTML = '';
    items.forEach(a => el.appendChild(showcaseCard(a)));
  }

  async function init() {
    skels($('#trendingRow'), 12);
    skels($('#popularRow'), 12);
    skels($('#topRatedRow'), 12);

    const [trending, popular, topRated] = await Promise.all([
      gql(Q.trending),
      gql(Q.popular),
      gql(Q.topRated),
    ]);

    // Hero — pick top 5 trending with a banner image
    heroAnime = trending.Page.media.filter(a => a.bannerImage || a.coverImage?.extraLarge).slice(0, 5);
    if (heroAnime.length) {
      setHero(heroAnime[0]);
      buildDots(heroAnime.length);
      heroTimer = setInterval(() => cycleHero((heroIdx + 1) % heroAnime.length), 6000);
    }

    fillRow($('#trendingRow'),  trending.Page.media);
    fillRow($('#popularRow'),   popular.Page.media);
    fillRow($('#topRatedRow'),  topRated.Page.media);
  }

  init().catch(console.error);
</script>
</body>
</html>
