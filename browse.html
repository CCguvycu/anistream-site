<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Free — AnimeWeb</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; overflow: hidden; margin: 0; }

    /* ── Top bar ───────────────────────────────────────────────────────────── */
    .top-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 900;
      height: 48px;
      background: rgba(9,9,15,0.97); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 0.75rem; padding: 0 1rem;
    }
    .top-logo {
      font-size: 1rem; font-weight: 800;
      background: var(--grad); -webkit-background-clip: text;
      background-clip: text; -webkit-text-fill-color: transparent;
      text-decoration: none; display: flex; align-items: center; gap: 7px;
      flex-shrink: 0;
    }
    .top-logo img { -webkit-text-fill-color: initial; }
    .top-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
    .top-site-name {
      font-size: 0.82rem; font-weight: 600; color: var(--purple-lt);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
    }
    .top-btn {
      padding: 0.3rem 0.8rem; border-radius: 100px; font-size: 0.75rem;
      font-weight: 600; border: 1px solid var(--border); background: var(--card);
      color: var(--muted); cursor: pointer; transition: all var(--t); flex-shrink: 0;
    }
    .top-btn:hover { border-color: var(--purple); color: var(--text); }
    .top-btn.active { background: rgba(168,85,247,.14); border-color: var(--purple); color: var(--purple-lt); }
    .top-home { font-size: 0.75rem; color: var(--muted); text-decoration: none; flex-shrink: 0; }
    .top-home:hover { color: var(--text); }

    /* ── Layout ────────────────────────────────────────────────────────────── */
    .layout {
      position: fixed; top: 48px; left: 0; right: 0; bottom: 0;
      display: flex;
    }

    /* ── Side panel ────────────────────────────────────────────────────────── */
    .side-panel {
      width: 280px; flex-shrink: 0;
      background: rgba(9,9,15,0.98);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      transition: width 0.25s ease, opacity 0.25s ease;
      overflow: hidden;
    }
    .side-panel.collapsed { width: 0; opacity: 0; }

    .panel-search-wrap {
      padding: 0.75rem 0.85rem 0.5rem;
      flex-shrink: 0;
    }
    .panel-search {
      width: 100%; background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.4rem 0.7rem;
      color: var(--text); font-size: 0.8rem; outline: none;
      transition: border-color var(--t);
    }
    .panel-search:focus { border-color: var(--purple); }
    .panel-search::placeholder { color: var(--dim); }

    /* Category pills */
    .cat-row {
      display: flex; gap: 0.35rem; padding: 0 0.85rem 0.6rem;
      overflow-x: auto; scrollbar-width: none; flex-shrink: 0;
    }
    .cat-row::-webkit-scrollbar { display: none; }
    .cat-pill {
      flex-shrink: 0; padding: 0.22rem 0.7rem; border-radius: 100px;
      font-size: 0.7rem; font-weight: 700; cursor: pointer;
      border: 1px solid var(--border); background: transparent; color: var(--dim);
      transition: all var(--t);
    }
    .cat-pill:hover { border-color: var(--purple); color: var(--text); }
    .cat-pill.active { background: rgba(168,85,247,.14); border-color: var(--purple); color: var(--purple-lt); }

    /* Site count */
    .site-count {
      font-size: 0.68rem; color: var(--dim);
      padding: 0 0.85rem 0.4rem; flex-shrink: 0;
    }

    /* Site list */
    .site-list {
      flex: 1; overflow-y: auto; padding: 0 0.5rem 1rem;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .site-card {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.55rem 0.65rem; border-radius: 8px; cursor: pointer;
      transition: background var(--t); margin-bottom: 1px;
    }
    .site-card:hover { background: var(--card); }
    .site-card.active { background: rgba(168,85,247,.12); }
    .site-favicon {
      width: 22px; height: 22px; border-radius: 5px; flex-shrink: 0;
      background: var(--card-hover); object-fit: cover;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; color: var(--dim); overflow: hidden;
    }
    .site-favicon img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }
    .site-info { flex: 1; min-width: 0; }
    .site-name {
      font-size: 0.8rem; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .site-card.active .site-name { color: var(--purple-lt); }
    .site-tag {
      font-size: 0.58rem; font-weight: 700; padding: 0.1rem 0.35rem;
      border-radius: 3px; text-transform: uppercase; letter-spacing: 0.04em;
    }
    .tag-sub  { background: rgba(34,211,238,.12); color: #22d3ee; }
    .tag-dub  { background: rgba(251,146, 60,.12); color: #fb923c; }
    .tag-both { background: rgba(168,85,247,.12);  color: var(--purple-lt); }
    .tag-official { background: rgba(74,222,128,.12); color: #4ade80; }
    .tag-manga { background: rgba(244,114,182,.12); color: #f472b6; }

    /* ── iframe ────────────────────────────────────────────────────────────── */
    .frame-wrap { flex: 1; position: relative; }
    .main-frame {
      position: absolute; inset: 0;
      width: 100%; height: 100%; border: none;
    }

    /* ── Empty state ───────────────────────────────────────────────────────── */
    .no-sites {
      text-align: center; padding: 2rem 1rem; color: var(--dim); font-size: 0.8rem;
    }
  </style>
</head>
<body>

<!-- Top bar -->
<div class="top-bar">
  <a href="database.html" class="top-logo">
    <img src="logo.svg" style="height:22px;width:22px;border-radius:5px;flex-shrink:0"> AnimeWeb
  </a>
  <div class="top-sep"></div>
  <span class="top-site-name" id="topSiteName">Select a site</span>
  <button class="top-btn active" id="toggleBtn" onclick="togglePanel()">≡ Sites</button>
  <div class="top-sep"></div>
  <a href="database.html" class="top-home">← Home</a>
  <a href="movies.html" class="top-home" style="margin-left:0.4rem">Movies</a>
  <a href="watchlist.html" class="top-home" style="margin-left:0.4rem">My List</a>
</div>

<div class="layout">
  <!-- Side panel -->
  <div class="side-panel" id="sidePanel">
    <div class="panel-search-wrap">
      <input class="panel-search" id="siteSearch" placeholder="Search sites…" autocomplete="off">
    </div>
    <div class="cat-row" id="catRow"></div>
    <div class="site-count" id="siteCount"></div>
    <div class="site-list" id="siteList"></div>
  </div>

  <!-- iframe -->
  <div class="frame-wrap">
    <iframe class="main-frame" id="frame"
      allowfullscreen
      allow="autoplay; fullscreen; picture-in-picture; encrypted-media; clipboard-write">
    </iframe>
  </div>
</div>

  { name: 'AniPlay',         url: 'https://aniplay.to/',                  tag: 'sub' },
  { name: 'AnimeKhor',       url: 'https://animekhor.org/',               tag: 'sub' },

  { name: 'Yomi',            url: 'https://yomi.to/',                     tag: 'sub' },
  { name: 'AnimeDAO',        url: 'https://animedao.to/',                 tag: 'sub' },
  { name: 'AnimeHub.io',     url: 'https://animehub.io/',                 tag: 'sub' },
  { name: 'GenoAnime',       url: 'https://genoanime.com/',               tag: 'sub' },
  { name: 'AnimeFever',      url: 'https://animefever.cc/',               tag: 'sub' },
  { name: 'AnimeStream',     url: 'https://anime.uniquestream.net/',      tag: 'sub' },

  { name: 'Animes.Vision',   url: 'https://animes.vision/',               tag: 'sub' },
  { name: 'OtakuStream',     url: 'https://otakustream.com/',             tag: 'sub' },

  { name: 'VoirAnime',       url: 'https://voiranime.com/',               tag: 'sub' },

  // ── Dub ────────────────────────────────────────────────────────────────────

  // ── Official / legal ───────────────────────────────────────────────────────
  { name: 'Crunchyroll',     url: 'https://www.crunchyroll.com/',         tag: 'official' },
  { name: 'Funimation',      url: 'https://www.funimation.com/',          tag: 'official' },
  { name: 'HiDive',          url: 'https://www.hidive.com/',              tag: 'official' },
  { name: 'Bilibili Anime',  url: 'https://www.bilibili.tv/',             tag: 'official' },
  { name: 'Netflix Anime',   url: 'https://www.netflix.com/browse/genre/7424', tag: 'official' },
  { name: 'VRV',             url: 'https://vrv.co/',                      tag: 'official' },

  // ── French ─────────────────────────────────────────────────────────────────
  { name: 'VostFree',        url: 'https://vostfree.ws/',                 tag: 'sub' },
  { name: 'MavAnimes',       url: 'https://mavanimes.co/',                tag: 'sub' },

  // ── Manga ──────────────────────────────────────────────────────────────────
  { name: 'MangaDex',        url: 'https://mangadex.org/',                tag: 'manga' },
  { name: 'MangaPlus',       url: 'https://mangaplus.shueisha.co.jp/',    tag: 'manga' },
  { name: 'MangaReader',     url: 'https://mangareader.to/',              tag: 'manga' },
  { name: 'TCBScans',        url: 'https://tcbscans.me/',                 tag: 'manga' },
  { name: 'MangaKakalot',    url: 'https://mangakakalot.com/',            tag: 'manga' },
  { name: 'MangaFire',       url: 'https://mangafire.to/',                tag: 'manga' },
  { name: 'Bato.to',         url: 'https://bato.to/',                     tag: 'manga' },
  { name: 'MangaBuddy',      url: 'https://mangabuddy.com/',              tag: 'manga' },
];

const CATS = [
  { id: 'all',      label: 'All'      },
  { id: 'top',      label: '⭐ Top'   },
  { id: 'sub',      label: 'Sub'      },
  { id: 'dub',      label: 'Dub'      },
  { id: 'both',     label: 'Sub+Dub'  },
  { id: 'official', label: 'Official' },
  { id: 'manga',    label: 'Manga'    },
];

const TAG_CLASS = {
  sub: 'tag-sub', dub: 'tag-dub', both: 'tag-both',
  official: 'tag-official', manga: 'tag-manga',
};

let curCat     = 'all';
let curSearch  = '';
let curSiteIdx = -1;
let panelOpen  = true;

const frame       = document.getElementById('frame');
const siteList    = document.getElementById('siteList');
const siteCount   = document.getElementById('siteCount');
const siteSearch  = document.getElementById('siteSearch');
const topSiteName = document.getElementById('topSiteName');
const toggleBtn   = document.getElementById('toggleBtn');

// ── Build category pills ──────────────────────────────────────────────────────
const catRow = document.getElementById('catRow');
CATS.forEach(c => {
  const btn = document.createElement('button');
  btn.className = 'cat-pill' + (c.id === curCat ? ' active' : '');
  btn.textContent = c.label;
  btn.onclick = () => {
    curCat = c.id;
    document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderList();
  };
  catRow.appendChild(btn);
});

// ── Search ────────────────────────────────────────────────────────────────────
siteSearch.addEventListener('input', e => {
  curSearch = e.target.value.trim().toLowerCase();
  renderList();
});

// ── Render site list ──────────────────────────────────────────────────────────
function renderList() {
  let items = SITES.map((s, i) => ({ ...s, idx: i }));
  if (curCat === 'top')      items = items.filter(s => s.top);
  else if (curCat !== 'all') items = items.filter(s => s.tag === curCat);
  if (curSearch) items = items.filter(s => s.name.toLowerCase().includes(curSearch));

  siteCount.textContent = `${items.length} site${items.length !== 1 ? 's' : ''}`;

  if (!items.length) {
    siteList.innerHTML = '<div class="no-sites">No sites found</div>';
    return;
  }

  siteList.innerHTML = '';
  items.forEach(s => {
    const card = document.createElement('div');
    card.className = 'site-card' + (s.idx === curSiteIdx ? ' active' : '');
    card.dataset.idx = s.idx;

    const host = new URL(s.url).hostname;
    const faviconUrl = `https://www.google.com/s2/favicons?sz=32&domain=${host}`;

    card.innerHTML = `
      <div class="site-favicon">
        <img src="${faviconUrl}" alt="" onerror="this.parentNode.textContent='${s.name[0]}'">
      </div>
      <div class="site-info">
        <div class="site-name">${s.name}</div>
      </div>
      <span class="site-tag ${TAG_CLASS[s.tag] || 'tag-sub'}">${s.tag}</span>`;

    card.addEventListener('click', () => loadSite(s.idx));
    siteList.appendChild(card);
  });
}

// ── Load site ─────────────────────────────────────────────────────────────────
function loadSite(idx) {
  curSiteIdx = idx;
  const s = SITES[idx];
  frame.src = s.url;
  topSiteName.textContent = s.name;
  document.title = `${s.name} — AnimeWeb`;
  document.querySelectorAll('.site-card').forEach(c => {
    c.classList.toggle('active', parseInt(c.dataset.idx) === idx);
  });
}

// ── Toggle panel ──────────────────────────────────────────────────────────────
function togglePanel() {
  panelOpen = !panelOpen;
  document.getElementById('sidePanel').classList.toggle('collapsed', !panelOpen);
  toggleBtn.classList.toggle('active', panelOpen);
}

// ── Deep link (search query from watch page) ──────────────────────────────────
const searchQ = new URLSearchParams(location.search).get('q');
if (searchQ) {
  frame.src = `https://hianime.to/search?keyword=${encodeURIComponent(searchQ)}`;
  topSiteName.textContent = `HiAnime — "${searchQ}"`;
}

renderList();
if (!searchQ) loadSite(0); // default: HiAnime
</script>
</body>
